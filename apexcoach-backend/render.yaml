services:
  - type: web
    name: apex-coach-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this in Render Dashboard for security
      - key: GOOD_LAP_PATH
        value: data/hackathon_good_lap.mcap
      - key: FAST_LAP_PATH
        value: data/hackathon_fast_laps.mcap
      - key: TRACK_JSON_PATH
        value: data/yas_marina_bnd.json
